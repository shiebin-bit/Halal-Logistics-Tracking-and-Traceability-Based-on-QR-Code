name: Backend CI

on:
  push:
    paths:
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/cd.yml"
      - "backend/halal_traceability_api/**"
      - "deploy/**"
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/cd.yml"
      - "backend/halal_traceability_api/**"
      - "deploy/**"
  workflow_dispatch:

jobs:
  backend-tests:
    name: PHP 8.2 Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/halal_traceability_api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: dom, mbstring, pdo, pdo_sqlite, sqlite3

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/halal_traceability_api/vendor
          key: ${{ runner.os }}-php-8.2-composer-${{ hashFiles('backend/halal_traceability_api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.2-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare test environment
        run: |
          cp .env.testing .env
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p storage/logs

      - name: Run backend tests
        env:
          APP_ENV: testing
        run: composer test

  backend-docker-build:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend-tests
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/halal-track-backend
      SCAN_IMAGE_REF: halaltrack-backend:trivy-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=sha-

      - name: Build backend image for Trivy scan
        uses: docker/build-push-action@v6
        with:
          context: ./backend/halal_traceability_api
          file: ./backend/halal_traceability_api/Dockerfile
          push: false
          load: true
          tags: ${{ env.SCAN_IMAGE_REF }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.68.2
          cache: true

      - name: Run Trivy image scan
        id: trivy-image-scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          skip-setup-trivy: true
          image-ref: ${{ env.SCAN_IMAGE_REF }}
          format: sarif
          output: trivy-image.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy image scan results
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif

      - name: Run Trivy config scan
        if: always()
        id: trivy-config-scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          skip-setup-trivy: true
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL
          hide-progress: true

      - name: Upload Trivy config scan results
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif

      - name: Upload Trivy scan artifacts
        if: always() && (hashFiles('trivy-image.sarif') != '' || hashFiles('trivy-config.sarif') != '')
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports-${{ github.run_id }}
          path: |
            trivy-image.sarif
            trivy-config.sarif
          if-no-files-found: ignore

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend/halal_traceability_api
          file: ./backend/halal_traceability_api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show generated image tags
        if: always()
        run: |
          echo "Local scan image:"
          echo "${{ env.SCAN_IMAGE_REF }}"
          echo "Publish tags:"
          echo "${{ steps.meta.outputs.tags }}"
