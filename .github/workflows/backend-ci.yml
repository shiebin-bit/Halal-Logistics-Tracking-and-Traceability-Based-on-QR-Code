name: Backend CI

on:
  push:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/halal_traceability_api/**"
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/halal_traceability_api/**"
  workflow_dispatch:

jobs:
  backend-tests:
    name: PHP 8.2 Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/halal_traceability_api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: dom, mbstring, pdo, pdo_sqlite, sqlite3

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/halal_traceability_api/vendor
          key: ${{ runner.os }}-php-8.2-composer-${{ hashFiles('backend/halal_traceability_api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.2-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare test environment
        run: |
          cp .env.testing .env
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p storage/logs

      - name: Run backend tests
        env:
          APP_ENV: testing
        run: composer test

  backend-docker-build:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend-tests
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/halal-track-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=sha-

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/halal_traceability_api
          file: ./backend/halal_traceability_api/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show generated image tags
        run: |
          echo "Built image tags:"
          echo "${{ steps.meta.outputs.tags }}"
