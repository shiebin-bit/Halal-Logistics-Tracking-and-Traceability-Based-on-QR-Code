services:
  app:
    image: ${BACKEND_IMAGE}
    container_name: halaltrack_app_prod
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      - db
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - public_data:/var/www/public
      - storage_public_data:/var/www/storage/app/public
      - storage_runtime_data:/var/www/storage/framework
      - storage_logs_data:/var/www/storage/logs
    networks:
      - halaltrack_network

  nginx:
    image: nginx:1.27-alpine
    container_name: halaltrack_nginx_prod
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - public_data:/var/www/public:ro
      - storage_public_data:/var/www/storage/app/public:ro
      - ../../backend/halal_traceability_api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - halaltrack_network

  db:
    image: mariadb:10.11
    container_name: halaltrack_mariadb_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PUBLIC_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Optional: mount an initialization SQL file if you really need one.
      # - ../../documentation/database/REPLACE_ME.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - halaltrack_network

  # Optional future services:
  # queue:
  #   image: ${BACKEND_IMAGE}
  #   container_name: halaltrack_queue_prod
  #   restart: unless-stopped
  #   working_dir: /var/www
  #   env_file:
  #     - .env
  #   command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
  #   depends_on:
  #     - app
  #     - db
  #   volumes:
  #     - public_data:/var/www/public
  #     - storage_public_data:/var/www/storage/app/public
  #     - storage_runtime_data:/var/www/storage/framework
  #     - storage_logs_data:/var/www/storage/logs
  #   networks:
  #     - halaltrack_network
  #
  # scheduler:
  #   image: ${BACKEND_IMAGE}
  #   container_name: halaltrack_scheduler_prod
  #   restart: unless-stopped
  #   working_dir: /var/www
  #   env_file:
  #     - .env
  #   command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
  #   depends_on:
  #     - app
  #     - db
  #   volumes:
  #     - public_data:/var/www/public
  #     - storage_public_data:/var/www/storage/app/public
  #     - storage_runtime_data:/var/www/storage/framework
  #     - storage_logs_data:/var/www/storage/logs
  #   networks:
  #     - halaltrack_network

volumes:
  db_data:
  public_data:
  storage_public_data:
  storage_runtime_data:
  storage_logs_data:

networks:
  halaltrack_network:
    driver: bridge
